# ============================================
# Docker Compose — 智能电商客服 RAG 系统
# ============================================
# 使用方法：
#   1. 复制 .env.example 为 .env 并修改配置
#   2. docker-compose up -d --build
#   3. 访问 http://localhost
# ============================================

services:
  # ---- 后端服务 ----
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rag-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/app.db
    volumes:
      - backend-data:/app/data
      - backend-logs:/app/logs
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

  # ---- 前端服务 ----
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rag-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  backend-data:
    driver: local
  backend-logs:
    driver: local
